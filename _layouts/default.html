<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} | Dongchao Yang</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="{{ '/style/jemdoc.css' | relative_url }}" rel="stylesheet" type="text/css">
  <link href="{{ '/style/blog.css' | relative_url }}" rel="stylesheet" type="text/css">
</head>
<body>

<!-- ===== Navigation Bar ===== -->
<nav class="navbar" id="navbar">
  <div class="nav-inner">
    <a href="{{ '/' | relative_url }}" class="nav-brand">Dongchao Yang</a>
    <div class="nav-links">
      <a href="{{ '/' | relative_url }}">Home</a>
      <a href="{{ '/blog' | relative_url }}">Blog</a>
    </div>
    <button class="nav-toggle" id="navToggle" aria-label="Toggle menu">
      <span></span><span></span><span></span>
    </button>
  </div>
</nav>

<div id="layout-content">
<div id="make-narrow">
  {{ content }}
</div>
</div>

<script>
const navbar = document.getElementById('navbar');
window.addEventListener('scroll', () => {
  navbar.classList.toggle('scrolled', window.scrollY > 50);
});
const navToggle = document.getElementById('navToggle');
const navLinks = document.querySelector('.nav-links');
navToggle.addEventListener('click', () => {
  navLinks.classList.toggle('open');
  navToggle.classList.toggle('open');
});
</script>

</body>
</html>
